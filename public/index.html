<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planes con Habibis 🎉</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="join-screen" class="join-screen">
    <div class="join-card">
      <h1>🎉 Planes con Habibis</h1>
      <p>Vota por el plan de fiesta en CDMX y armemos el mejor plan con el menor gasto.</p>
      <input id="name-input" type="text" placeholder="¿Cómo te llamas?" maxlength="40" />
      <button id="join-btn">Entrar</button>
    </div>
  </div>

  <div id="app" class="app hidden">
    <header>
      <h1>🎉 Planes con Habibis</h1>
      <div class="user-pill">Hola, <span id="user-name"></span> 👋</div>
    </header>

    <div id="week-banner" class="week-banner"></div>

    <section class="controls">
      <label>
        Tamaño del grupo:
        <input id="group-size" type="number" min="1" max="100" />
      </label>
      <button id="add-plan-btn">+ Sugerir plan</button>
    </section>

    <section id="calendar-summary" class="calendar-summary"></section>

    <main id="plans-list" class="plans-list"></main>

    <dialog id="add-plan-dialog">
      <form id="add-plan-form">
        <h2>Sugerir nuevo plan</h2>
        <input name="name" placeholder="Nombre del lugar" required maxlength="60" />
        <input name="zone" placeholder="Zona (ej. Roma Norte)" required maxlength="60" />
        <select name="dia" required>
          <option value="Jueves">Jueves</option>
          <option value="Viernes">Viernes</option>
          <option value="Sábado" selected>Sábado</option>
          <option value="Domingo">Domingo</option>
        </select>
        <input name="tipo" placeholder="Tipo (antro, bar, rooftop...)" maxlength="60" />
        <input name="cover" type="number" min="0" placeholder="Cover por persona ($)" />
        <input name="consumoPromedio" type="number" min="0" placeholder="Consumo promedio por persona ($)" />
        <input name="transporteCosto" type="number" min="0" placeholder="Traslado estimado (un sentido, $)" />
        <input name="transporteNota" placeholder="Nota de traslado" maxlength="200" />
        <input name="coverNota" placeholder="Nota del cover" maxlength="200" />
        <input name="fuente" placeholder="Link / fuente (opcional)" maxlength="300" />
        <div class="dialog-actions">
          <button type="button" id="cancel-add-plan">Cancelar</button>
          <button type="submit">Agregar plan</button>
        </div>
      </form>
    </dialog>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
